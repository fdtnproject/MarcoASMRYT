<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CFA Reading Session 01 | Original PDF Figures</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap');

    :root {
      --bg: #071018;
      --panel: rgba(244, 249, 255, 0.06);
      --border: rgba(201, 220, 241, 0.16);
      --text: #eef6ff;
      --muted: rgba(238, 246, 255, 0.72);
      --accent: #b8d6ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Source Sans 3", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(116, 168, 230, 0.18), transparent 30%),
        linear-gradient(180deg, #0e1721, var(--bg));
    }

    .page {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 80px;
    }

    header {
      margin-bottom: 20px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 26px;
      background: var(--panel);
    }

    .kicker {
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 8px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(42px, 6vw, 72px);
      line-height: 0.95;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      font-weight: 700;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    figure {
      margin: 0;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.04);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #071018;
    }

    figcaption {
      margin-top: 12px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div class="kicker">CFA Reading Session 01 / Original PDF Pages</div>
      <h1>Original PDF Figures</h1>
      <p>Queste sono le pagine originali del PDF usate nel flusso del teleprompter. Le figure principali restano cliccabili anche dentro lo script.</p>
      <div class="actions">
        <a class="button" href="./teleprompter.html">Teleprompter</a>
        <a class="button" href="./cfa01-content.js">Content JS</a>
      </div>
    </header>

    <section class="grid">
      <figure>
        <a href="./visuals/pdf-original/page-019-original.png">
          <img src="./visuals/pdf-original/page-019-original.png" alt="Original PDF page 19">
        </a>
        <figcaption>Original PDF page 19 - Example 1 and Exhibit 1.</figcaption>
      </figure>

      <figure>
        <a href="./visuals/pdf-original/page-022-original.png">
          <img src="./visuals/pdf-original/page-022-original.png" alt="Original PDF page 22">
        </a>
        <figcaption>Original PDF page 22 - Exhibit 2.</figcaption>
      </figure>

      <figure>
        <a href="./visuals/pdf-original/page-023-original.png">
          <img src="./visuals/pdf-original/page-023-original.png" alt="Original PDF page 23">
        </a>
        <figcaption>Original PDF page 23 - Example 2, Example 3, and Exhibit 3.</figcaption>
      </figure>

      <figure>
        <a href="./visuals/pdf-original/page-024-original.png">
          <img src="./visuals/pdf-original/page-024-original.png" alt="Original PDF page 24">
        </a>
        <figcaption>Original PDF page 24 - Example 4, Exhibit 4, and beginning of Exhibit 5.</figcaption>
      </figure>

      <figure>

        </a>
        <figcaption>Original PDF page 25 - continuation of Exhibit 5 and calculations.</figcaption>

      <figure>

        <figcaption>Original PDF page 26 - Exhibit 6.</figcaption>

      <figure>
        <a href="./visuals/pdf-original/page-028-original.png">

        </a>
        <figcaption>Original PDF page 28 - Example 7 and Exhibit 7.</figcaption>

      <figure>

          <img src="./visuals/pdf-original/page-029-original.png" alt="Original PDF page 29">
        </a>
        <figcaption>Original PDF page 29 - Example 7 calculations and Exhibit 8 setup.</figcaption>
      </figure>

      <figure>
        <a href="./visuals/pdf-original/page-030-original.png">
          <img src="./visuals/pdf-original/page-030-original.png" alt="Original PDF page 30">
        </a>
        <figcaption>Original PDF page 30 - Exhibit 8 and Exhibit 9 question set.</figcaption>
      </figure>
    </section>
  </main>
</body>
</html>
