<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Mutual Fund Holding Period Return</title>
  <desc id="desc">Original reference card for the mutual fund three-year holding period return example.</desc>
  <rect width="1200" height="720" fill="#071018"/>
  <text x="80" y="92" fill="#b8d6ff" font-family="Arial, sans-serif" font-size="24" letter-spacing="3">EXHIBIT 3 REFERENCE</text>
  <text x="80" y="148" fill="#eef6ff" font-family="Georgia, serif" font-size="48">Mutual Fund Performance</text>
  <text x="80" y="190" fill="#b9cadb" font-family="Arial, sans-serif" font-size="24">Three annual returns compounded into one holding period return</text>

  <g font-family="Arial, sans-serif">
    <rect x="110" y="250" width="980" height="76" rx="18" fill="#0f1d2b" stroke="#567ea8"/>
    <text x="160" y="298" fill="#d7e7ff" font-size="26" font-weight="700">Year</text>
    <text x="420" y="298" fill="#d7e7ff" font-size="26" font-weight="700">Return</text>
    <text x="705" y="298" fill="#d7e7ff" font-size="26" font-weight="700">Growth Factor</text>

    <rect x="110" y="348" width="980" height="72" rx="16" fill="#112334"/>
    <text x="160" y="394" fill="#eef6ff" font-size="26">20X8</text>
    <text x="420" y="394" fill="#eef6ff" font-size="26">14%</text>
    <text x="705" y="394" fill="#eef6ff" font-size="26">1.14</text>

    <rect x="110" y="438" width="980" height="72" rx="16" fill="#14293d"/>
    <text x="160" y="484" fill="#eef6ff" font-size="26">20X9</text>
    <text x="420" y="484" fill="#eef6ff" font-size="26">-10%</text>
    <text x="705" y="484" fill="#eef6ff" font-size="26">0.90</text>

    <rect x="110" y="528" width="980" height="72" rx="16" fill="#112334"/>
    <text x="160" y="574" fill="#eef6ff" font-size="26">20X0</text>
    <text x="420" y="574" fill="#eef6ff" font-size="26">-2%</text>
    <text x="705" y="574" fill="#eef6ff" font-size="26">0.98</text>
  </g>

  <rect x="110" y="625" width="980" height="58" rx="16" fill="#183757" stroke="#8fb5e6"/>
  <text x="145" y="663" fill="#ffffff" font-family="Arial, sans-serif" font-size="25">Total HPR = (1.14 x 0.90 x 0.98) - 1 = 0.55%</text>
</svg>
