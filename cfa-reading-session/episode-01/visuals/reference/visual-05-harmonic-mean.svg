<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Harmonic Mean and Cost Averaging</title>
  <desc id="desc">Original visual showing why the harmonic mean helps with rates and ratios.</desc>
  <rect width="1200" height="760" fill="#071018"/>
  <text x="80" y="92" fill="#b8d6ff" font-family="Arial, sans-serif" font-size="24" letter-spacing="3">HARMONIC MEAN</text>
  <text x="80" y="148" fill="#eef6ff" font-family="Georgia, serif" font-size="48">Cost Averaging Example</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="220" width="480" height="220" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="110" y="278" fill="#d7e7ff" font-size="30" font-weight="700">Month 1</text>
    <text x="110" y="330" fill="#eef6ff" font-size="28">Invested: EUR 1,000</text>
    <text x="110" y="376" fill="#eef6ff" font-size="28">Price: EUR 10 per share</text>
    <text x="110" y="422" fill="#ffffff" font-size="30">Shares bought: 100.00</text>

    <rect x="640" y="220" width="480" height="220" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="670" y="278" fill="#d7e7ff" font-size="30" font-weight="700">Month 2</text>
    <text x="670" y="330" fill="#eef6ff" font-size="28">Invested: EUR 1,000</text>
    <text x="670" y="376" fill="#eef6ff" font-size="28">Price: EUR 15 per share</text>
    <text x="670" y="422" fill="#ffffff" font-size="30">Shares bought: 66.67</text>

    <rect x="80" y="500" width="1040" height="160" rx="24" fill="#0f1d2b" stroke="#8fb5e6" stroke-width="2"/>
    <text x="110" y="560" fill="#ffffff" font-size="30">Total spent = EUR 2,000</text>
    <text x="430" y="560" fill="#ffffff" font-size="30">Total shares = 166.67</text>
    <text x="760" y="560" fill="#ffffff" font-size="30">Average price paid = EUR 12</text>
    <text x="110" y="618" fill="#d7e7ff" font-size="24">That EUR 12 average is the harmonic mean of 10 and 15.</text>
  </g>

  <text x="80" y="710" fill="#9cb7d3" font-family="Arial, sans-serif" font-size="22">Useful for rates, ratios, and valuation multiples because large outliers get less weight than under an arithmetic mean.</text>
</svg>
