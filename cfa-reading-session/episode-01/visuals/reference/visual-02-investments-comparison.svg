<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Investment Alternatives and Their Characteristics</title>
  <desc id="desc">Original table comparing debt securities used to infer liquidity and default premia.</desc>
  <rect width="1200" height="760" fill="#071018"/>
  <text x="80" y="92" fill="#b8d6ff" font-family="Arial, sans-serif" font-size="24" letter-spacing="3">VISUAL REFERENCE</text>
  <text x="80" y="148" fill="#eef6ff" font-family="Georgia, serif" font-size="48">Comparing Debt Securities</text>
  <text x="80" y="190" fill="#b9cadb" font-family="Arial, sans-serif" font-size="24">Same logic as the CFA example, redrawn for teleprompter use</text>

  <rect x="80" y="240" width="1040" height="70" rx="18" fill="#0f1d2b" stroke="#567ea8"/>
  <g fill="#d7e7ff" font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <text x="120" y="284">Investment</text>
    <text x="315" y="284">Maturity</text>
    <text x="500" y="284">Liquidity</text>
    <text x="685" y="284">Default Risk</text>
    <text x="930" y="284">Interest Rate</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="24" fill="#eef6ff">
    <rect x="80" y="330" width="1040" height="70" rx="16" fill="#112334"/>
    <text x="140" y="374">1</text><text x="325" y="374">2 years</text><text x="505" y="374">High</text><text x="720" y="374">Low</text><text x="955" y="374">2.0%</text>
    <rect x="80" y="414" width="1040" height="70" rx="16" fill="#14293d"/>
    <text x="140" y="458">2</text><text x="325" y="458">2 years</text><text x="505" y="458">Low</text><text x="720" y="458">Low</text><text x="955" y="458">2.5%</text>
    <rect x="80" y="498" width="1040" height="70" rx="16" fill="#112334"/>
    <text x="140" y="542">3</text><text x="325" y="542">7 years</text><text x="505" y="542">Low</text><text x="720" y="542">Low</text><text x="955" y="542">r3</text>
    <rect x="80" y="582" width="1040" height="70" rx="16" fill="#14293d"/>
    <text x="140" y="626">4</text><text x="325" y="626">8 years</text><text x="505" y="626">High</text><text x="720" y="626">Low</text><text x="955" y="626">4.0%</text>
    <rect x="80" y="666" width="1040" height="70" rx="16" fill="#112334"/>
    <text x="140" y="710">5</text><text x="325" y="710">8 years</text><text x="505" y="710">Low</text><text x="720" y="710">High</text><text x="955" y="710">6.5%</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="820" y="332" width="270" height="58" rx="14" fill="#183757" stroke="#8fb5e6"/>
    <text x="850" y="369" fill="#ffffff" font-size="22">2 vs 1: +0.5% = liquidity premium</text>
    <rect x="760" y="416" width="330" height="58" rx="14" fill="#183757" stroke="#8fb5e6"/>
    <text x="790" y="453" fill="#ffffff" font-size="22">5 vs 4: +2.5% total difference</text>
    <rect x="740" y="500" width="350" height="58" rx="14" fill="#183757" stroke="#8fb5e6"/>
    <text x="770" y="537" fill="#ffffff" font-size="22">Subtract liquidity 0.5% -> default 2.0%</text>
  </g>
</svg>
