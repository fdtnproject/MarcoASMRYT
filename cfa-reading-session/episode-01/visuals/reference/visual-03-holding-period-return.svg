<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Holding Period Return</title>
  <desc id="desc">Original visual explaining holding period return as capital gain or loss plus income divided by beginning price.</desc>
  <rect width="1200" height="700" fill="#071018"/>
  <text x="80" y="92" fill="#b8d6ff" font-family="Arial, sans-serif" font-size="24" letter-spacing="3">RETURN BASICS</text>
  <text x="80" y="148" fill="#eef6ff" font-family="Georgia, serif" font-size="48">Holding Period Return</text>

  <rect x="80" y="210" width="1040" height="110" rx="26" fill="#0f1d2b" stroke="#567ea8"/>
  <text x="120" y="278" fill="#ffffff" font-family="Arial, sans-serif" font-size="34">R = (Ending price - Beginning price + Income received) / Beginning price</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="380" width="320" height="190" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="108" y="430" fill="#d7e7ff" font-size="28" font-weight="700">Capital Gain or Loss</text>
    <text x="108" y="476" fill="#eef6ff" font-size="24">Ending price minus</text>
    <text x="108" y="512" fill="#eef6ff" font-size="24">beginning price.</text>

    <rect x="440" y="380" width="320" height="190" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="468" y="430" fill="#d7e7ff" font-size="28" font-weight="700">Income Yield</text>
    <text x="468" y="476" fill="#eef6ff" font-size="24">Dividends or interest</text>
    <text x="468" y="512" fill="#eef6ff" font-size="24">received during the period.</text>

    <rect x="800" y="380" width="320" height="190" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="828" y="430" fill="#d7e7ff" font-size="28" font-weight="700">Base</text>
    <text x="828" y="476" fill="#eef6ff" font-size="24">Always divide by the</text>
    <text x="828" y="512" fill="#eef6ff" font-size="24">initial invested amount.</text>
  </g>

  <text x="80" y="638" fill="#9cb7d3" font-family="Arial, sans-serif" font-size="22">Example logic: a positive dividend can be outweighed by a larger capital loss, leaving total return negative.</text>
</svg>
