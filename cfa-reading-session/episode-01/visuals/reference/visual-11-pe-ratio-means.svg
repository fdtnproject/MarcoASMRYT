<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">P E Ratio Means</title>
  <desc id="desc">Original reference card for the arithmetic, geometric, and harmonic mean P E example.</desc>
  <rect width="1200" height="760" fill="#071018"/>
  <text x="80" y="92" fill="#b8d6ff" font-family="Arial, sans-serif" font-size="24" letter-spacing="3">EXHIBIT 7 REFERENCE</text>
  <text x="80" y="148" fill="#eef6ff" font-family="Georgia, serif" font-size="48">P/E Ratios and the Harmonic Mean</text>
  <text x="80" y="190" fill="#b9cadb" font-family="Arial, sans-serif" font-size="24">Ten stock picks, three ways to summarize valuation multiples</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="240" width="520" height="360" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="115" y="292" fill="#d7e7ff" font-size="28" font-weight="700">P/E observations</text>
    <g fill="#eef6ff" font-size="24">
      <text x="115" y="345">22.29</text><text x="255" y="345">15.54</text><text x="395" y="345">9.38</text>
      <text x="115" y="395">15.12</text><text x="255" y="395">10.72</text><text x="395" y="395">14.57</text>
      <text x="115" y="445">7.20</text><text x="255" y="445">7.97</text><text x="395" y="445">10.34</text>
      <text x="115" y="495">8.35</text>
    </g>

    <rect x="660" y="240" width="460" height="360" rx="24" fill="#0f1d2b" stroke="#8fb5e6"/>
    <text x="700" y="300" fill="#ffffff" font-size="30">Arithmetic mean: 12.1480</text>
    <text x="700" y="370" fill="#ffffff" font-size="30">Geometric mean: 11.4287</text>
    <text x="700" y="440" fill="#ffffff" font-size="30">Harmonic mean: 10.8142</text>
    <text x="700" y="520" fill="#d7e7ff" font-size="24">For ratios and multiples, harmonic mean</text>
    <text x="700" y="556" fill="#d7e7ff" font-size="24">reduces the pull of high outliers.</text>
  </g>

  <text x="80" y="670" fill="#9cb7d3" font-family="Arial, sans-serif" font-size="22">Ordering in this case: harmonic mean &lt; geometric mean &lt; arithmetic mean.</text>
</svg>
