<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Choosing the Right Mean</title>
  <desc id="desc">Original decision guide for choosing arithmetic, geometric, harmonic, trimmed, or winsorized mean.</desc>
  <rect width="1200" height="780" fill="#071018"/>
  <text x="80" y="92" fill="#b8d6ff" font-family="Arial, sans-serif" font-size="24" letter-spacing="3">DECISION GUIDE</text>
  <text x="80" y="148" fill="#eef6ff" font-family="Georgia, serif" font-size="48">Which Mean Fits the Problem?</text>

  <g font-family="Arial, sans-serif">
    <rect x="390" y="210" width="420" height="92" rx="24" fill="#0f1d2b" stroke="#8fb5e6" stroke-width="2"/>
    <text x="432" y="266" fill="#ffffff" font-size="30">What are you trying to summarize?</text>

    <line x1="600" y1="302" x2="600" y2="360" stroke="#8fb5e6" stroke-width="4"/>
    <line x1="280" y1="420" x2="920" y2="420" stroke="#8fb5e6" stroke-width="4"/>
    <line x1="280" y1="420" x2="280" y2="470" stroke="#8fb5e6" stroke-width="4"/>
    <line x1="600" y1="420" x2="600" y2="470" stroke="#8fb5e6" stroke-width="4"/>
    <line x1="920" y1="420" x2="920" y2="470" stroke="#8fb5e6" stroke-width="4"/>

    <rect x="120" y="470" width="320" height="170" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="150" y="522" fill="#d7e7ff" font-size="28" font-weight="700">Average one-period return?</text>
    <text x="150" y="574" fill="#ffffff" font-size="34">Use Arithmetic Mean</text>
    <text x="150" y="618" fill="#c6d8ec" font-size="22">Best for average single-period observations.</text>

    <rect x="440" y="470" width="320" height="170" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="470" y="522" fill="#d7e7ff" font-size="28" font-weight="700">Compounding across time?</text>
    <text x="470" y="574" fill="#ffffff" font-size="34">Use Geometric Mean</text>
    <text x="470" y="618" fill="#c6d8ec" font-size="22">Best for multi-period growth and performance.</text>

    <rect x="760" y="470" width="320" height="170" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="790" y="522" fill="#d7e7ff" font-size="28" font-weight="700">Ratios or strong outliers?</text>
    <text x="790" y="574" fill="#ffffff" font-size="30">Use Harmonic / Trimmed / Winsorized</text>
    <text x="790" y="618" fill="#c6d8ec" font-size="22">Good for multiples and outlier control.</text>
  </g>

  <text x="80" y="716" fill="#9cb7d3" font-family="Arial, sans-serif" font-size="22">The formula matters, but the question matters first.</text>
</svg>
