<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Interest Rate Components</title>
  <desc id="desc">Original visual summary of the building blocks of a market interest rate.</desc>
  <rect width="1200" height="720" fill="#071018"/>
  <circle cx="170" cy="120" r="180" fill="#14304f" opacity="0.35"/>
  <circle cx="1020" cy="610" r="240" fill="#1d3f67" opacity="0.18"/>
  <text x="80" y="92" fill="#b8d6ff" font-family="Arial, sans-serif" font-size="24" letter-spacing="3">CFA READING SESSION 01</text>
  <text x="80" y="150" fill="#eef6ff" font-family="Georgia, serif" font-size="50">What Sits Inside a Market Interest Rate</text>
  <text x="80" y="198" fill="#b9cadb" font-family="Arial, sans-serif" font-size="24">Original reference card based on CFA Level I 2024, Learning Module 1</text>

  <rect x="80" y="250" width="1040" height="96" rx="24" fill="#0e1721" stroke="#4d79a8" stroke-width="2"/>
  <text x="110" y="308" fill="#ffffff" font-family="Arial, sans-serif" font-size="30">Market interest rate = Real risk-free rate + Inflation premium + Default risk premium + Liquidity premium + Maturity premium</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="390" width="300" height="210" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="108" y="438" fill="#d7e7ff" font-size="26" font-weight="700">Real Risk-Free Rate</text>
    <text x="108" y="478" fill="#eef6ff" font-size="22">Pure reward for waiting</text>
    <text x="108" y="512" fill="#eef6ff" font-size="22">in a no-inflation, no-risk</text>
    <text x="108" y="546" fill="#eef6ff" font-size="22">setting.</text>

    <rect x="410" y="390" width="300" height="210" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="438" y="438" fill="#d7e7ff" font-size="26" font-weight="700">Inflation Premium</text>
    <text x="438" y="478" fill="#eef6ff" font-size="22">Compensation for expected</text>
    <text x="438" y="512" fill="#eef6ff" font-size="22">loss of purchasing power</text>
    <text x="438" y="546" fill="#eef6ff" font-size="22">over the debt horizon.</text>

    <rect x="740" y="390" width="380" height="210" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="768" y="438" fill="#d7e7ff" font-size="26" font-weight="700">Risk Premia</text>
    <text x="768" y="478" fill="#eef6ff" font-size="22">Default: risk borrower does not pay.</text>
    <text x="768" y="512" fill="#eef6ff" font-size="22">Liquidity: cost of selling fast near fair value.</text>
    <text x="768" y="546" fill="#eef6ff" font-size="22">Maturity: longer debt is more rate-sensitive.</text>
  </g>

  <text x="80" y="656" fill="#9cb7d3" font-family="Arial, sans-serif" font-size="20">Remember: nominal risk-free rate is often approximated as real risk-free rate + inflation premium.</text>
</svg>
