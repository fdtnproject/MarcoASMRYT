<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Country Index Arithmetic and Geometric Returns</title>
  <desc id="desc">Original compact table for the selected country stock index return example.</desc>
  <rect width="1200" height="860" fill="#071018"/>
