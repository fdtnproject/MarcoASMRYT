<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Hedge Fund Geometric Mean Return</title>
  <desc id="desc">Original reference card for the hedge fund geometric mean example.</desc>
  <rect width="1200" height="720" fill="#071018"/>
  <text x="80" y="92" fill="#b8d6ff" font-family="Arial, sans-serif" font-size="24" letter-spacing="3">EXHIBIT 4 REFERENCE</text>
  <text x="80" y="148" fill="#eef6ff" font-family="Georgia, serif" font-size="48">Hedge Fund Geometric Mean</text>
  <text x="80" y="190" fill="#b9cadb" font-family="Arial, sans-serif" font-size="24">Convert a volatile return path into one constant compounded rate</text>

  <g font-family="Arial, sans-serif">
    <rect x="90" y="250" width="300" height="170" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="130" y="306" fill="#d7e7ff" font-size="30" font-weight="700">20X8</text>
    <text x="130" y="370" fill="#ffffff" font-size="46">+22%</text>

    <rect x="450" y="250" width="300" height="170" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="490" y="306" fill="#d7e7ff" font-size="30" font-weight="700">20X9</text>
    <text x="490" y="370" fill="#ffffff" font-size="46">-25%</text>

    <rect x="810" y="250" width="300" height="170" rx="24" fill="#102131" stroke="#547eab"/>
    <text x="850" y="306" fill="#d7e7ff" font-size="30" font-weight="700">20X0</text>
    <text x="850" y="370" fill="#ffffff" font-size="46">+11%</text>

    <rect x="90" y="500" width="1020" height="98" rx="24" fill="#0f1d2b" stroke="#8fb5e6"/>
    <text x="130" y="560" fill="#ffffff" font-size="30">Geometric mean = [(1.22 x 0.75 x 1.11)^(1/3)] - 1 = 0.52%</text>
  </g>

  <text x="90" y="660" fill="#9cb7d3" font-family="Arial, sans-serif" font-size="22">Key idea: the geometric mean follows the compounded wealth path, not the simple average.</text>
</svg>
